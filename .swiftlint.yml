included:
  - gmax
  - gmaxTests
  - gmaxUITests

excluded:
  - gmax.xcodeproj
  - docs
  - scripts

reporter: xcode

disabled_rules:
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - function_parameter_count
  - cyclomatic_complexity
  - nesting
  - large_tuple
  - identifier_name
  - type_name
  - todo
  - trailing_comma
  - switch_case_alignment
  - implicit_optional_initialization
  - multiple_closures_with_trailing_closure
  - for_where

opt_in_rules:
  - empty_count
  - empty_string
  - force_unwrapping
  - implicitly_unwrapped_optional

force_try:
  severity: error

force_cast:
  severity: error

force_unwrapping:
  severity: error

implicitly_unwrapped_optional:
  severity: error
